name: Update Alpine.js docs

on:
  schedule:
    # Runs every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      alpine_ref:
        description: 'Alpine.js git ref to fetch docs from (branch, tag, or commit SHA)'
        required: false
        default: 'main'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Regenerate docs
        run: npm run generate
        env:
          ALPINE_REF: ${{ github.event.inputs.alpine_ref || 'main' }}

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet src/resources/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated docs
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/resources/
          git commit -m "chore: update Alpine.js docs from upstream"
          git push

      - name: Bump version and tag
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          git add package.json package-lock.json
          git commit -m "chore: bump to v${VERSION}"
          git tag "v${VERSION}"
          git push
          git push --tags
